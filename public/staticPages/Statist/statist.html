<!doctype html>
<html lang="en" data-theme="dark|light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistics</title>
  <link rel="icon" href="../icons/statistic.png" />
  <link rel="stylesheet" href="./Style.css" />
</head>

<body>
  <header>
    <img src="../../icons/LOGO.png" alt="Statistics Icon" class="Logo" />
    <div class="custom_page">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-translate"
        id="langIcon" viewBox="0 0 16 16">
        <path d="M4.545 6.714 4.11 8H3l1.862-5h1.284L8 8H6.833l-.435-1.286zm1.634-.736L5.5 3.956h-.049l-.679 2.022z" />
        <path
          d="M0 2a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v3h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-3H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zm7.138 9.995q.289.451.63.846c-.748.575-1.673 1.001-2.768 1.292.178.217.451.635.555.867 1.125-.359 2.08-.844 2.886-1.494.777.665 1.739 1.165 2.93 1.472.133-.254.414-.673.629-.89-1.125-.253-2.057-.694-2.82-1.284.681-.747 1.222-1.651 1.621-2.757H14V8h-3v1.047h.765c-.318.844-.74 1.546-1.272 2.13a6 6 0 0 1-.415-.492 2 2 0 0 1-.94.31" />
      </svg>
      <select id="language-select">
        <option value="" selected hidden></option>
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="ar">العربية</option>
      </select>
      <i id="dark-mode-toggle">
        <div id="modeIcon"></div>
      </i>
    </div>
  </header>
  <div id="no-data" style="display:none;" class="warn_section">
    <img src="../../icons/statistic.png" alt="Pls don't acces this page, it will just distract you" class="warn_img" />
    <div class="warn_text">
      <h1 class="title">Welcome to your dashboard</h1>
      <p class="message">
        Use The extension to see your progress!
      </p>
    </div>
  </div>
  <main class="Cards">
    <div class="Card_info">
      <p class="title">Today's focus</p>
      <p class="data" id="todayFocus">Xh Ym</p>
    </div>
    <div class="Card_info">
      <p class="title">Tasks Smashed</p>
      <p class="data" id="tasksSmashed">X</p>
    </div>
    <div class="Card_info">
      <p class="title">Quiet Time</p>
      <p class="data" id="quietTime">Xmin</p>
    </div>
    <div class="Card_info">
      <p class="title">Blocks Deflected</p>
      <p class="data" id="blocksDeflected">X</p>
    </div>
  </main>
  <div class="Chart">
    <div id="chart-container-calendar"></div>
  </div>
  <div class="Timeframe">
    <i class="timeLable"> 7d </i>
    <i class="timeLable">30d</i>
    <i class="timeLable">3m</i>
    <i class="timeLable">6m</i>
  </div>
  <div class="chart">
    <div id="chart-container-pomodoro"></div>
  </div>
  <div class="chart">
    <div id="chart-container-session"></div>
  </div>
  <div class="chart">
    <div id="chart-container-sound"></div>
  </div>
  <div class="chart">
    <div id="chart-container-totalTasks"></div>
  </div>
  <div class="chart">
    <div id="chart-container-completedTasks"></div>
  </div>
  <div class="chart">
    <div id="chart-container-blockedPages"></div>
  </div>
  <script src="./translation.js"></script>
  <script src="../../vendor/echarts.min.js#"></script>
  <script src="./Script.js"></script>
</body>

</html>
